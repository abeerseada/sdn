name: fat-tree-k4

mgmt:
  ipv4-subnet: 172.20.20.0/24
  ipv4-gw: 172.20.20.1

topology:
  nodes:

    # ────────────────────────────────────────────────
    # SDN Controller (Ryu + FlowManager UI)
    # ────────────────────────────────────────────────
    ctrl:
      kind: linux
      image: martimy/ryu-flowmanager:latest
      mgmt-ipv4: 172.20.20.10
      binds:
        - config:/home/auser/labs
      ports:
        - 8081:8080
      entrypoint: ryu-manager flowmanager/flowmanager.py labs/fat_tree.py

    # ────────────────────────────────────────────────
    # Core Layer  (k²/4 = 4 switches)
    # ────────────────────────────────────────────────
    c1:
      kind: ovs-bridge
    c2:
      kind: ovs-bridge
    c3:
      kind: ovs-bridge
    c4:
      kind: ovs-bridge

    # ────────────────────────────────────────────────
    # Aggregation Layer  (k pods × k/2 = 8 switches)
    # ────────────────────────────────────────────────
    a01:
      kind: ovs-bridge
    a02:
      kind: ovs-bridge
    a11:
      kind: ovs-bridge
    a12:
      kind: ovs-bridge
    a21:
      kind: ovs-bridge
    a22:
      kind: ovs-bridge
    a31:
      kind: ovs-bridge
    a32:
      kind: ovs-bridge

    # ────────────────────────────────────────────────
    # Edge Layer  (k pods × k/2 = 8 switches)
    # ────────────────────────────────────────────────
    e01:
      kind: ovs-bridge
    e02:
      kind: ovs-bridge
    e11:
      kind: ovs-bridge
    e12:
      kind: ovs-bridge
    e21:
      kind: ovs-bridge
    e22:
      kind: ovs-bridge
    e31:
      kind: ovs-bridge
    e32:
      kind: ovs-bridge

    # ────────────────────────────────────────────────
    # Hosts — Pod 0  (10.0.x.x/24)
    # ────────────────────────────────────────────────
    h011:
      kind: linux
      image: wbitt/network-multitool:alpine-minimal
      mgmt-ipv4: 172.20.20.21
      exec:
        - ip link set dev eth1 address 00:00:0a:00:01:01
        - ip addr add 10.0.1.1/8 dev eth1
    h012:
      kind: linux
      image: wbitt/network-multitool:alpine-minimal
      mgmt-ipv4: 172.20.20.22
      exec:
        - ip link set dev eth1 address 00:00:0a:00:01:02
        - ip addr add 10.0.1.2/8 dev eth1
    h021:
      kind: linux
      image: wbitt/network-multitool:alpine-minimal
      mgmt-ipv4: 172.20.20.23
      exec:
        - ip link set dev eth1 address 00:00:0a:00:02:01
        - ip addr add 10.0.2.1/8 dev eth1
    h022:
      kind: linux
      image: wbitt/network-multitool:alpine-minimal
      mgmt-ipv4: 172.20.20.24
      exec:
        - ip link set dev eth1 address 00:00:0a:00:02:02
        - ip addr add 10.0.2.2/8 dev eth1

    # ────────────────────────────────────────────────
    # Hosts — Pod 1  (10.1.x.x/24)
    # ────────────────────────────────────────────────
    h111:
      kind: linux
      image: wbitt/network-multitool:alpine-minimal
      mgmt-ipv4: 172.20.20.25
      exec:
        - ip link set dev eth1 address 00:00:0a:01:01:01
        - ip addr add 10.1.1.1/8 dev eth1
    h112:
      kind: linux
      image: wbitt/network-multitool:alpine-minimal
      mgmt-ipv4: 172.20.20.26
      exec:
        - ip link set dev eth1 address 00:00:0a:01:01:02
        - ip addr add 10.1.1.2/8 dev eth1
    h121:
      kind: linux
      image: wbitt/network-multitool:alpine-minimal
      mgmt-ipv4: 172.20.20.27
      exec:
        - ip link set dev eth1 address 00:00:0a:01:02:01
        - ip addr add 10.1.2.1/8 dev eth1
    h122:
      kind: linux
      image: wbitt/network-multitool:alpine-minimal
      mgmt-ipv4: 172.20.20.28
      exec:
        - ip link set dev eth1 address 00:00:0a:01:02:02
        - ip addr add 10.1.2.2/8 dev eth1

    # ────────────────────────────────────────────────
    # Hosts — Pod 2  (10.2.x.x/24)
    # ────────────────────────────────────────────────
    h211:
      kind: linux
      image: wbitt/network-multitool:alpine-minimal
      mgmt-ipv4: 172.20.20.29
      exec:
        - ip link set dev eth1 address 00:00:0a:02:01:01
        - ip addr add 10.2.1.1/8 dev eth1
    h212:
      kind: linux
      image: wbitt/network-multitool:alpine-minimal
      mgmt-ipv4: 172.20.20.30
      exec:
        - ip link set dev eth1 address 00:00:0a:02:01:02
        - ip addr add 10.2.1.2/8 dev eth1
    h221:
      kind: linux
      image: wbitt/network-multitool:alpine-minimal
      mgmt-ipv4: 172.20.20.31
      exec:
        - ip link set dev eth1 address 00:00:0a:02:02:01
        - ip addr add 10.2.2.1/8 dev eth1
    h222:
      kind: linux
      image: wbitt/network-multitool:alpine-minimal
      mgmt-ipv4: 172.20.20.32
      exec:
        - ip link set dev eth1 address 00:00:0a:02:02:02
        - ip addr add 10.2.2.2/8 dev eth1

    # ────────────────────────────────────────────────
    # Hosts — Pod 3  (10.3.x.x/24)
    # ────────────────────────────────────────────────
    h311:
      kind: linux
      image: wbitt/network-multitool:alpine-minimal
      mgmt-ipv4: 172.20.20.33
      exec:
        - ip link set dev eth1 address 00:00:0a:03:01:01
        - ip addr add 10.3.1.1/8 dev eth1
    h312:
      kind: linux
      image: wbitt/network-multitool:alpine-minimal
      mgmt-ipv4: 172.20.20.34
      exec:
        - ip link set dev eth1 address 00:00:0a:03:01:02
        - ip addr add 10.3.1.2/8 dev eth1
    h321:
      kind: linux
      image: wbitt/network-multitool:alpine-minimal
      mgmt-ipv4: 172.20.20.35
      exec:
        - ip link set dev eth1 address 00:00:0a:03:02:01
        - ip addr add 10.3.2.1/8 dev eth1
    h322:
      kind: linux
      image: wbitt/network-multitool:alpine-minimal
      mgmt-ipv4: 172.20.20.36
      exec:
        - ip link set dev eth1 address 00:00:0a:03:02:02
        - ip addr add 10.3.2.2/8 dev eth1

  links:
    # c1 → first agg in each pod (ports 1-4)
    - endpoints: ["c1:c1a01", "a01:a01c1"]
    - endpoints: ["c1:c1a11", "a11:a11c1"]
    - endpoints: ["c1:c1a21", "a21:a21c1"]
    - endpoints: ["c1:c1a31", "a31:a31c1"]
    # c2 → first agg in each pod
    - endpoints: ["c2:c2a01", "a01:a01c2"]
    - endpoints: ["c2:c2a11", "a11:a11c2"]
    - endpoints: ["c2:c2a21", "a21:a21c2"]
    - endpoints: ["c2:c2a31", "a31:a31c2"]
    # c3 → second agg in each pod
    - endpoints: ["c3:c3a02", "a02:a02c3"]
    - endpoints: ["c3:c3a12", "a12:a12c3"]
    - endpoints: ["c3:c3a22", "a22:a22c3"]
    - endpoints: ["c3:c3a32", "a32:a32c3"]
    # c4 → second agg in each pod
    - endpoints: ["c4:c4a02", "a02:a02c4"]
    - endpoints: ["c4:c4a12", "a12:a12c4"]
    - endpoints: ["c4:c4a22", "a22:a22c4"]
    - endpoints: ["c4:c4a32", "a32:a32c4"]

    # Pod 0 agg → edge
    - endpoints: ["a01:a01e01", "e01:e01a01"]
    - endpoints: ["a01:a01e02", "e02:e02a01"]
    - endpoints: ["a02:a02e01", "e01:e01a02"]
    - endpoints: ["a02:a02e02", "e02:e02a02"]
    # Pod 1 agg → edge
    - endpoints: ["a11:a11e11", "e11:e11a11"]
    - endpoints: ["a11:a11e12", "e12:e12a11"]
    - endpoints: ["a12:a12e11", "e11:e11a12"]
    - endpoints: ["a12:a12e12", "e12:e12a12"]
    # Pod 2 agg → edge
    - endpoints: ["a21:a21e21", "e21:e21a21"]
    - endpoints: ["a21:a21e22", "e22:e22a21"]
    - endpoints: ["a22:a22e21", "e21:e21a22"]
    - endpoints: ["a22:a22e22", "e22:e22a22"]
    # Pod 3 agg → edge
    - endpoints: ["a31:a31e31", "e31:e31a31"]
    - endpoints: ["a31:a31e32", "e32:e32a31"]
    - endpoints: ["a32:a32e31", "e31:e31a32"]
    - endpoints: ["a32:a32e32", "e32:e32a32"]

    # Pod 0 edge → hosts
    - endpoints: ["h011:eth1", "e01:e01h011"]
    - endpoints: ["h012:eth1", "e01:e01h012"]
    - endpoints: ["h021:eth1", "e02:e02h021"]
    - endpoints: ["h022:eth1", "e02:e02h022"]
    # Pod 1 edge → hosts
    - endpoints: ["h111:eth1", "e11:e11h111"]
    - endpoints: ["h112:eth1", "e11:e11h112"]
    - endpoints: ["h121:eth1", "e12:e12h121"]
    - endpoints: ["h122:eth1", "e12:e12h122"]
    # Pod 2 edge → hosts
    - endpoints: ["h211:eth1", "e21:e21h211"]
    - endpoints: ["h212:eth1", "e21:e21h212"]
    - endpoints: ["h221:eth1", "e22:e22h221"]
    - endpoints: ["h222:eth1", "e22:e22h222"]
    # Pod 3 edge → hosts
    - endpoints: ["h311:eth1", "e31:e31h311"]
    - endpoints: ["h312:eth1", "e31:e31h312"]
    - endpoints: ["h321:eth1", "e32:e32h321"]
    - endpoints: ["h322:eth1", "e32:e32h322"]
